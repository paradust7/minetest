<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luanti - Open Source Voxel Game Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            display: block;
			width: 100%;
			height: 100%;
            background: #000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-status {
            font-size: 1.2em;
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #loading-progress {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        #loading-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" tabindex="1"></canvas>
        
        <div id="loading-screen">
            <div class="loading-spinner"></div>
            <div id="loading-status">Initializing Luanti...</div>
            <div id="loading-progress">
                <div id="loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Luanti initialization script (loads before Emscripten) -->
    <script src="luanti-init.js"></script>
    <script>
        const interval = setInterval(async () => {
            if (!!window.Luanti) {
                clearInterval(interval);
            }
            else return;

            const progressListener = (progress) => {
                const loadingProgress = document.getElementById('loading-progress-bar');
                if (loadingProgress) {
                    loadingProgress.style.width = (progress * 100).toFixed(2) + '%';
                }
            };
            Luanti.addProgressChangeListener(progressListener);

            if (await Luanti.isReady) {
                document.getElementById('loading-screen').classList.add('hidden');
                Luanti.removeProgressChangeListener(progressListener);
                Luanti.run();
            }
        }, 50);
    </script>

    <!-- Emscripten-generated JavaScript will be inserted here -->
    {{{ SCRIPT }}}
</body>
</html>
